[build]
  # Run npm install at the monorepo root (all deps live here),
  # then build the Vite app from apps/web
  command = "npm install && cd apps/web && npx vite build"
  publish = "apps/web/dist"

[build.environment]
  NODE_VERSION = "20"

# ── SPA fallback ───────────────────────────────────────────────────────────────
# All routes (including hard-refreshes) served from index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── API proxy (optional) ───────────────────────────────────────────────────────
# If you deploy the FastAPI backend somewhere (e.g. Render, Railway, Fly.io)
# uncomment and fill in your backend URL. This lets the frontend call /api/*
# without CORS issues instead of using VITE_API_URL.
#
# [[redirects]]
#   from   = "/api/*"
#   to     = "https://YOUR-BACKEND-URL.onrender.com/api/:splat"
#   status = 200
#   force  = true
