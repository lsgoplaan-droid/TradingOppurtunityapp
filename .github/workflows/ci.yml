name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -e ".[dev]" 2>/dev/null || pip install -e .

      - name: Lint (TypeScript)
        run: npx nx affected --target=lint --base=origin/main --head=HEAD

      - name: Type-check
        run: npx tsc --noEmit

      - name: Test (Python — no integration tests in CI)
        run: pytest -m "not integration" --tb=short -q

      - name: Build (affected)
        run: npx nx affected --target=build --base=origin/main --head=HEAD
